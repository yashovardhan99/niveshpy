# Release Workflow
# This workflow is used to create a release by updating the changelog,
# tagging the release, and publishing it to PyPI.
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag for the release (e.g., v1.0.0)"
        required: true
      pre-release:
        description: "Is this a pre-release?"
        required: false
        default: false
        type: boolean
jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: mukunku/tag-exists-action@v1.7.0
        id: check-tag
        with:
          tag: ${{ github.event.inputs.version }}
      - name: Fail if tag exists
        if: steps.check-tag.outputs.exists == 'true'
        run: |
          echo "Tag already exists. Please use a different version."
          exit 1

  tag-and-release:
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'branch' }}
    permissions:
      contents: write
    needs: validate-tag
    steps:
      - name: Log Inputs
        run: |
          echo "Version: ${{ github.event.inputs.version }}"

      - uses: actions/create-github-app-token@v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.ACTIONS_APP_CLIENT_ID }}
          private-key: ${{ secrets.ACTIONS_BOT_PRIVATE_KEY }}

      - name: Checkout Code
        uses: actions/checkout@v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.ref }}

      - name: Set up Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          # Install a specific version of uv.
          version: "0.11.19"
          enable-cache: true

      - name: Install python
        run: uv python install

      - name: Update Changelog
        run: |
          uv run --no-project .github/scripts/update_changelog.py $TAG
          git add CHANGELOG.md
          git commit -m "Update changelog for release $TAG"
          git push origin $BRANCH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}
          BRANCH: ${{ github.ref_name }}

      - name: Create Tag
        run: |
          CHANGES=$(uv run --no-project .github/scripts/get_release_notes.py $TAG)
          git tag -a $TAG -m "$TAG" -m "$CHANGES" --cleanup=whitespace
          git push origin $TAG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}

      - name: Create Draft release
        run: |
          gh release create  $TAG --notes-from-tag --discussion-category "General" --draft=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}
        if: ${{ github.event.inputs.pre-release != 'true' }}

      - name: Create Draft Pre-release
        run: |
          gh release create $TAG --notes-from-tag --prerelease --discussion-category "General" --draft=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}
        if: ${{ github.event.inputs.pre-release == 'true' }}

  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - tag-and-release
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.inputs.version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          # Install a specific version of uv.
          version: "0.11.19"
          enable-cache: true

      - name: Install python
        run: uv python install

      - name: Check Lockfile
        run: uv lock --check

      - name: Build distribution
        run: uv build

      - parallel:
          - name: Smoke test (wheel)
            run: uv run --isolated --no-project --with dist/*.whl niveshpy --help

          - name: Smoke test (source distribution)
            run: uv run --isolated --no-project --with dist/*.tar.gz niveshpy --help

      - name: Store the distribution packages
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    needs:
      - build
      - tag-and-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/niveshpy
    permissions:
      id-token: write # IMPORTANT: mandatory for trusted publishing
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to PyPI
        run: uv publish

  publish-to-github:
    name: >-
      Upload distribution 📦 to GitHub
    needs:
      - build
      - tag-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to upload the distribution to the release
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Upload distribution 📦 to GitHub
        run: gh release upload $TAG $FILE --clobber --repo yashovardhan99/niveshpy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}
          FILE: dist/*.tar.gz dist/*.whl

      - name: Publish release
        run: gh release edit $TAG --draft=false --repo yashovardhan99/niveshpy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.version }}
